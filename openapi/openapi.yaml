  /v1/tasks/{task_id}:
    get:
      operationId: getTaskStatus
      summary: Get Task Status
      description: 根据 task_id 查询异步生成任务的状态与结果。
      tags:
        - Task
      parameters:
        - name: task_id
          in: path
          required: true
          description: 异步任务 ID
          schema:
            type: string
          example: task_seedance_15pro_001
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskStatusResponse"
              examples:
                completed:
                  summary: 任务完成
                  value:
                    task_id: task_seedance_15pro_001
                    status: completed
                    type: video.generation
                    progress: 100
                    result:
                      url: https://example.com/mock-videos/task_seedance_15pro_001.mp4
                      model: seedance-1.5-pro
                processing:
                  summary: 任务进行中
                  value:
                    task_id: task_seedance_15pro_001
                    status: processing
                    type: video.generation
                    progress: 45
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/credits/balance:
    get:
      operationId: getCreditsBalance
      summary: Check Your Credits
      description: 返回当前账号的积分余额与使用情况。
      tags:
        - Credits
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditsBalanceResponse"
              examples:
                default:
                  summary: 积分余额
                  value:
                    object: credits.balance
                    balance: 98500
                    currency: credits
                    used_today: 1500
                    limit_daily: 100000
                    reset_at: 1700086400
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        在 Authorization Header 中传入 API Key。
        格式：`Bearer sk-mock-xxx`

  responses:
    Unauthorized:
      description: 认证失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            default:
              value:
                error:
                  message: Invalid API Key provided
                  type: authentication_error
                  code: invalid_api_key
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            default:
              value:
                error:
                  message: Resource not found
                  type: not_found_error
                  code: resource_not_found

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - message
            - type
            - code
          properties:
            message:
              type: string
            type:
              type: string
            code:
              type: string

    VideoGenerationRequest:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          description: 视频生成提示词
        duration:
          type: integer
          minimum: 1
          maximum: 30
          default: 5
          description: 视频时长（秒）
        resolution:
          type: string
          enum:
            - 480p
            - 720p
            - 1080p
          default: 720p
          description: 视频分辨率
        aspect_ratio:
          type: string
          enum:
            - "16:9"
            - "9:16"
            - "1:1"
          default: "16:9"
          description: 画面比例

    VideoGenerationResponse:
      type: object
      properties:
        task_id:
          type: string
          description: 异步任务 ID，用于查询生成进度
        status:
          type: string
          enum:
            - queued
            - processing
            - completed
            - failed
        model:
          type: string
        created:
          type: integer

    ImageGenerationRequest:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          description: 图像生成提示词
        size:
          type: string
          enum:
            - 256x256
            - 512x512
            - 1024x1024
            - 1792x1024
          default: 1024x1024
          description: 图像尺寸
        n:
          type: integer
          minimum: 1
          maximum: 4
          default: 1
          description: 生成数量

    ImageGenerationResponse:
      type: object
      properties:
        task_id:
          type: string
          description: 异步任务 ID
        status:
          type: string
          enum:
            - queued
            - processing
            - completed
            - failed
        model:
          type: string
        created:
          type: integer

    TaskStatusResponse:
      type: object
      properties:
        task_id:
          type: string
        status:
          type: string
          enum:
            - queued
            - processing
            - completed
            - failed
        type:
          type: string
          description: 任务类型，如 video.generation 或 image.generation
        progress:
          type: integer
          minimum: 0
          maximum: 100
        result:
          type: object
          additionalProperties: true
          description: 任务完成时的结果数据

    CreditsBalanceResponse:
      type: object
      properties:
        object:
          type: string
          example: credits.balance
        balance:
          type: integer
        currency:
          type: string
          example: credits
        used_today:
          type: integer
        limit_daily:
          type: integer
        reset_at:
          type: integer
