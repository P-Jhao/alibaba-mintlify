openapi: 3.1.0
info:
  title: Pollo AI Mock API
  description: |
    AI 生成 API Mock 规范，用于 Mintlify 文档站。
    本地 Mock Server 默认地址：`http://localhost:4010`
  version: 1.0.0
  contact:
    name: Mock API Support
    email: mock@example.com

servers:
  - url: http://127.0.0.1:4010
    description: 本地 Prism Mock Server

security:
  - bearerAuth: []

paths:
  /v1/video/seedance/1-5-pro:
    post:
      operationId: createSeedance15Pro
      summary: Seedance 1.5 Pro
      description: 使用 Seedance 1.5 Pro 模型生成视频，返回异步任务 ID。
      tags:
        - Videos
        - Seedance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoGenerationRequest"
            examples:
              default:
                summary: 文本生成视频
                value:
                  prompt: 无人机航拍城市夜景，镜头缓慢推进，电影级光影
                  duration: 5
                  resolution: 1080p
                  aspect_ratio: "16:9"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoGenerationResponse"
              examples:
                default:
                  summary: 任务已创建
                  value:
                    task_id: task_seedance_15pro_001
                    status: processing
                    model: seedance-1.5-pro
                    created: 1700000001
        "401":
          $ref: "#/components/responses/Unauthorized"

